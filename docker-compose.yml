version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    # Puerto interno solo, cloudflared se encarga del acceso externo
    ports:
      - "8081:8081"
    expose:
      - "8081"
    depends_on:
      - backend
    networks:
      - portfolio-network

  backend:
    build:
      context: ../back_portfolio
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    volumes:
      - backend-data:/app/data
    env_file:
      - ../back_portfolio/.env
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  backend-data:
